services:
  - name: bank-ledger-backend
    type: web
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: "20"
  - name: bank-ledger-frontend
    type: web
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
